<svg viewBox="0 0 660 150" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;800&amp;display=swap');

            .text-proj {
                font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
                font-size: 52px;
                font-weight: 400;
                fill: #0f172a;
                letter-spacing: -1.5px;
            }
            .text-fin {
                font-weight: 400;
                fill: #0096c7;
                letter-spacing: -1.5px;
            }
        </style>
        <filter id="box-shadow" x="-10%" y="-10%" width="120%" height="130%">
            <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.06"/>
        </filter>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0ea5e9" flood-opacity="0.4"/>
        </filter>
        <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#6366f1" />
            <stop offset="100%" stop-color="#0096c7" />
        </linearGradient>
        <linearGradient id="area-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.25" />
            <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.0" />
        </linearGradient>
        <clipPath id="box-clip">
            <rect x="20" y="25" width="100" height="100" rx="24" />
        </clipPath>
    </defs>
    <g id="icon">
        <rect x="20" y="25" width="100" height="100" rx="24" fill="#ffffff" filter="url(#box-shadow)" />
        <g clip-path="url(#box-clip)">
            <rect x="20" y="25" width="100" height="100" fill="#f8fafc" />
            <line x1="20" y1="40" x2="110" y2="40" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="4 4" opacity="0.3" />
            <line x1="110" y1="40" x2="110" y2="125" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="4 4" opacity="0.4" />
            <path d="M 10,85 L 20,85 Q 40,110 65,75 T 110,40 L 130,40 L 130,130 L 10,130 Z" fill="url(#area-grad)" />
            <path d="M 20,85 Q 40,110 65,75 T 110,40" fill="none" stroke="url(#line-grad)" stroke-width="5" stroke-linecap="round" filter="url(#glow)" />
        </g>
        <circle cx="110" cy="40" r="12" fill="#0ea5e9" opacity="0.25" filter="url(#glow)"/>
        <circle cx="110" cy="40" r="4.5" fill="#ffffff" stroke="#0ea5e9" stroke-width="3" />
        <rect x="20" y="25" width="100" height="100" rx="24" fill="none" stroke="#e2e8f0" stroke-width="1.5" />
    </g>
    <g id="text">
        <text x="145" y="94" class="text-proj">
            Projection <tspan class="text-fin">Finance</tspan>
        </text>
    </g>
</svg>
