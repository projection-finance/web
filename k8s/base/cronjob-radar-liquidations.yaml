apiVersion: batch/v1
kind: CronJob
metadata:
  name: projection-radar-liquidations
spec:
  schedule: "0 */4 * * *" # Every 4 hours
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: cron
              image: curlimages/curl:8.5.0
              command:
                - sh
                - -c
                - |
                  curl -sf --max-time 540 -H "x-cron-secret: $CRON_SECRET" \
                    "http://projection-web/api/cron/radar-liquidations"
              envFrom:
                - secretRef:
                    name: projection-web-secret
